<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الاختبارات | مهندس عماد للفيزياء</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<header class="topbar">
  <div class="container nav-wrap">
    <a class="brand" href="index.html">مهندس عماد للفيزياء</a>
    <nav class="nav">
      <a href="index.html">الرئيسية</a>
      <a href="about.html">عن الموقع</a>
      <a href="lessons.html">الدروس</a>
      <a href="tests.html" class="active">الاختبارات</a>
      <a href="library.html">المكتبة</a>
      <a href="contact.html">تواصل معنا</a>
    </nav>
  </div>
</header>
<main class="section">
  <div class="container">
    <div class="section-head">
      <span class="section-tag">الاختبارات</span>
      <h1>اختبر فهمك بسرعة</h1>
      <p>أجب عن الأسئلة التالية ثم اضغط على زر التصحيح.</p>
    </div>
    <div class="quiz-card">
      <div class="quiz-block">
        <h3>1) ما وحدة قياس القوة؟</h3>
        <label><input type="radio" name="q1" value="a"> نيوتن</label>
        <label><input type="radio" name="q1" value="b"> جول</label>
        <label><input type="radio" name="q1" value="c"> وات</label>
      </div>
      <div class="quiz-block">
        <h3>2) ما العلاقة الصحيحة لقانون أوم؟</h3>
        <label><input type="radio" name="q2" value="a"> V = I / R</label>
        <label><input type="radio" name="q2" value="b"> V = I × R</label>
        <label><input type="radio" name="q2" value="c"> R = V × I</label>
      </div>
      <div class="quiz-block">
        <h3>3) الحركة التي تتغير فيها السرعة بانتظام تسمى:</h3>
        <label><input type="radio" name="q3" value="a"> حركة منتظمة</label>
        <label><input type="radio" name="q3" value="b"> حركة متسارعة</label>
        <label><input type="radio" name="q3" value="c"> سكون</label>
      </div>
      <button class="btn primary" id="checkQuiz">تصحيح الاختبار</button>
      <p class="result" id="quizResult"></p>
    </div>
  </div>
</main>
<footer class="footer">© 2026 مهندس عماد للفيزياء</footer>
<script>
document.getElementById('checkQuiz').addEventListener('click', function () {
  const answers = { q1: 'a', q2: 'b', q3: 'b' };
  let score = 0;
  for (const key in answers) {
    const selected = document.querySelector(`input[name="${key}"]:checked`);
    if (selected && selected.value === answers[key]) score++;
  }
  document.getElementById('quizResult').textContent = `نتيجتك: ${score}/3`;
});
</script>
</body>
</html>
